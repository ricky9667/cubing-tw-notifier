spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cubing_events
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
  chat:
    id: ${TELEGRAM_CHAT_ID:}
notification:
  start:
    zone: ${NOTIFICATION_START_ZONE:Asia/Taipei}
